server:
  port: 8085
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true

spring:
  application:
    name: auth
  http:
    encoding:
      charset: UTF-8
      force: true
      enabled: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://neocc-mysql:3306/dafuweng_auth?allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
  cloud:
    nacos:
      discovery:
        enabled: false

mybatis-plus:
  mapper-locations: classpath:auth/mapper/*.xml
  type-aliases-package: com.dafuweng.auth.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  # JWT签名密钥（生产环境应使用更复杂的密钥）
  secret: NeoCC2024SecretKeyForJWTTokenGenerationAndValidation123456
  # Token过期时间（毫秒），默认24小时
  expiration: 86400000
  # Refresh Token过期时间（毫秒），默认7天
  refresh-expiration: 604800000
  # Token前缀
  prefix: "Bearer "

logging:
  level:
    com.dafuweng: DEBUG
