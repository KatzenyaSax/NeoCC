server:
  port: 8085
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true

spring:
  application:
    name: auth
  http:
    encoding:
      charset: UTF-8
      force: true
      enabled: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/dafuweng_auth?allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        password: nacos
        username: nacos
        namespace: afae1f3f-8800-48c4-a161-c525a45538c9

mybatis-plus:
  mapper-locations: classpath:auth/mapper/*.xml
  type-aliases-package: com.dafuweng.auth.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  # JWT签名密钥（生产环境应使用更复杂的密钥）
  secret: NeoCC2024SecretKeyForJWTTokenGenerationAndValidation123456
  # Token过期时间（毫秒），默认24小时
  expiration: 86400000
  # Refresh Token过期时间（毫秒），默认7天
  refresh-expiration: 604800000
  # Token前缀
  prefix: "Bearer "

logging:
  level:
    com.dafuweng: DEBUG

# Swagger配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  info:
    title: NeoCC 认证服务API
    version: 1.0.0
    description: NeoCC信贷管理系统 - 认证授权模块
