server:
  port: 8083

spring:
  application:
    name: sales
  # 解决中文乱码问题
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/dafuweng_sales?allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        password: nacos
        username: nacos
        namespace: afae1f3f-8800-48c4-a161-c525a45538c9




mybatis-plus:
  mapper-locations: classpath:sales/mapper/*.xml
  type-aliases-package: com.dafuweng.sales.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: AUTO  # 使用数据库自增ID（解决JavaScript大数字精度问题）
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.dafuweng: DEBUG

# Feign 客户端配置（容器网络）
feign:
  auth:
    url: http://neocc-auth:8085
  finance:
    url: http://neocc-finance:8084
  system:
    url: http://neocc-system:8082
