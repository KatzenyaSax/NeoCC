server:
  port: 8086

spring:
  application:
    name: gateway
  main:
    web-application-type: reactive
  # 解决中文乱码问题
  codec:
    encoding:
      charset: UTF-8

  cloud:
    nacos:
      discovery:
        server-addr: dafuweng-nacos:8848
        password: nacos
        username: nacos
        namespace: afae1f3f-8800-48c4-a161-c525a45538c9
    openfeign:
      lb:
        enabled: false
    loadbalancer:
      enabled: false
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        # Auth 服务 - /auth/** → http://neocc-auth:8085 (去掉 /auth 前缀)
        - id: auth-route
          uri: http://neocc-auth:8085
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        # System 服务 - /system/api/** → http://neocc-system:8082 (去掉 /system)
        - id: system-route
          uri: http://neocc-system:8082
          predicates:
            - Path=/system/api/**
          filters:
            - StripPrefix=1

        # Auth 服务处理 /auth/api/** (SysUser, SysRole 等)
        - id: auth-api-route
          uri: http://neocc-auth:8085
          predicates:
            - Path=/auth/api/**
          filters:
            - StripPrefix=1

        # Sales 服务 - /sales/**
        - id: sales-route
          uri: http://neocc-sales:8083
          predicates:
            - Path=/sales/**
          filters:
            - StripPrefix=1

        # Finance 服务 - /finance/**
        - id: finance-route
          uri: http://neocc-finance:8084
          predicates:
            - Path=/finance/**
          filters:
            - StripPrefix=1

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

logging:
  level:
    com.dafuweng: DEBUG
    org.springframework.cloud.gateway: DEBUG
