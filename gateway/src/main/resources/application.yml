server:
  port: 8086

spring:
  application:
    name: gateway
  main:
    web-application-type: reactive

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        password: nacos
        username: nacos
        namespace: afae1f3f-8800-48c4-a161-c525a45538c9
    gateway:
      routes:
        - id: "gateway-test"
          uri: "http://www.bilibili.com"
          predicates:
            - Path=/bilibili

        # RuoYi 前端适配：登录认证相关接口（根路径）
        - id: auth-root-route
          uri: http://neocc-auth:8085
          predicates:
            - Path=/captchaImage,/login,/logout,/register,/getInfo,/getRouters,/unlockscreen

        - id: auth-route
          uri: lb://auth
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        - id: finance-route
          uri: http://neocc-finance:8084
          predicates:
            - Path=/finance/**

        - id: sales-route
          uri: http://neocc-sales:8083
          predicates:
            - Path=/sales/**

        - id: system-route
          uri: http://neocc-system:8082
          predicates:
            - Path=/system/**

        # 销售模块 API 路由
        - id: sales-api-customer
          uri: http://neocc-sales:8083
          predicates:
            - Path=/api/customer/**

        - id: sales-api-contract
          uri: http://neocc-sales:8083
          predicates:
            - Path=/api/contract/**

        - id: sales-api-contact-record
          uri: http://neocc-sales:8083
          predicates:
            - Path=/api/contactRecord/**

        - id: sales-api-customer-transfer
          uri: http://neocc-sales:8083
          predicates:
            - Path=/api/customerTransferLog/**

        - id: sales-api-performance
          uri: http://neocc-sales:8083
          predicates:
            - Path=/api/performanceRecord/**

        - id: sales-api-worklog
          uri: http://neocc-sales:8083
          predicates:
            - Path=/api/workLog/**

        # 财务模块 API 路由
        - id: finance-api-loan-audit
          uri: http://neocc-finance:8084
          predicates:
            - Path=/api/loanAudit/**

        - id: finance-api-commission
          uri: http://neocc-finance:8084
          predicates:
            - Path=/api/commissionRecord/**

        - id: finance-api-service-fee
          uri: http://neocc-finance:8084
          predicates:
            - Path=/api/serviceFeeRecord/**

        - id: finance-api-bank
          uri: http://neocc-finance:8084
          predicates:
            - Path=/api/bank/**

        - id: finance-api-product
          uri: http://neocc-finance:8084
          predicates:
            - Path=/api/financeProduct/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false
            maxAge: 3600













logging:
  level:
    com.dafuweng: DEBUG
