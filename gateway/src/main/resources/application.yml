server:
  port: 8086

spring:
  application:
    name: gateway
  main:
    web-application-type: reactive

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        password: nacos
        username: nacos
        namespace: afae1f3f-8800-48c4-a161-c525a45538c9
    gateway:
      routes:
        - id: "gateway-test"
          uri: "http://www.bilibili.com"
          predicates:
            - Path=/bilibili

        - id: auth-route
          uri: http://localhost:8085
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        - id: finance-route
          uri: http://localhost:8084
          predicates:
            - Path=/finance/**
          filters:
            - StripPrefix=1

        - id: sales-route
          uri: http://localhost:8083
          predicates:
            - Path=/sales/**
          filters:
            - StripPrefix=1

        - id: system-route
          uri: http://localhost:8082
          predicates:
            - Path=/system/**
          filters:
            - StripPrefix=1













logging:
  level:
    com.dafuweng: DEBUG
